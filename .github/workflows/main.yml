# Required repository secrets:.
#   SILVASMS_SSH_USER            - SSH/SFTP username on the host
#   SILVASMS_SSH_HOST            - SSH/SFTP host
#   SILVASMS_SSH_PORT            - SSH/SFTP port
#   SILVASMS_SSH_KEY             - SSH private key
#   SILVASMS_DEPLOY_PATH         - remote path for the Laravel backend
#   SILVASMS_FRONTEND_DEPLOY_PATH - remote path for the built frontend (dist/)
name: 🚀 Deploy SILVASMS to Hostinger via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, curl, xml, ctype, json, tokenizer
          tools: composer

      - name: Install PHP dependencies
        working-directory: Silvasms_back
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Remove unnecessary files
        working-directory: Silvasms_back
        run: |
          rm -rf .git .github tests vendor node_modules
          rm -rf storage/framework/cache/* storage/framework/sessions/* storage/framework/views/* storage/logs/*
          rm -f .env .env.example

      - name: Deploy files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SILVASMS_SSH_USER }}
          server: ${{ secrets.SILVASMS_SSH_HOST }}
          port: ${{ secrets.SILVASMS_SSH_PORT }}
          ssh_private_key: ${{ secrets.SILVASMS_SSH_KEY }}
          local_path: './Silvasms_back/'
          remote_path: ${{ secrets.SILVASMS_DEPLOY_PATH }}
          sftp_only: true

      - name: Run deployment commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SILVASMS_SSH_HOST }}
          username: ${{ secrets.SILVASMS_SSH_USER }}
          key: ${{ secrets.SILVASMS_SSH_KEY }}
          port: ${{ secrets.SILVASMS_SSH_PORT }}
          script: |
            set -e

            echo "📍 Current location:"
            pwd

            echo "📂 Changing to deployment directory..."
            cd ${{ secrets.SILVASMS_DEPLOY_PATH }}

            echo "📍 Now at:"
            pwd

            echo "📄 Files in directory:"
            ls -la

            echo "🔍 Looking for artisan:"
            ls -l artisan || echo "❌ artisan file not found!"

            echo "🔍 Checking for views directory:"
            ls -la resources/views || echo "❌ views directory not found!"

            echo "📁 Creating necessary directories..."
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache

            echo "🔄 Running migrations..."
            php artisan migrate

            # Import service names to database
            # php artisan sms:import-services

            # echo "Composer autoload dump"
            # composer dump-autoload

            # echo "Seeding database"
            # php artisan db:seed

            echo "🗑️ Clearing old cache..."
            php artisan optimize:clear

            # echo "⚡ Optimizing Laravel..."
            # php artisan config:cache

            # # Only cache routes if you have route closures converted to controller methods
            # # If you have closures in routes/web.php or routes/api.php, skip this
            # if php artisan route:cache 2>/dev/null; then
            #   echo "✅ Routes cached successfully"
            # else
            #   echo "⚠️ Route caching skipped (you may have route closures)"
            # fi

            echo "🔒 Setting permissions..."
            chmod -R 775 storage bootstrap/cache

            # If you're on shared hosting, you might need:
            # find storage bootstrap/cache -type f -exec chmod 664 {} \;
            # find storage bootstrap/cache -type d -exec chmod 775 {} \;

            echo "✅ Deployment complete!"

  deploy-frontend:
    name: Deploy Frontend to Host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Silvasms_Front/package-lock.json

      - name: Install dependencies
        working-directory: Silvasms_Front
        run: npm ci

      - name: Build frontend
        working-directory: Silvasms_Front
        run: npm run build

      - name: Deploy build via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SILVASMS_SSH_USER }}
          server: ${{ secrets.SILVASMS_SSH_HOST }}
          port: ${{ secrets.SILVASMS_SSH_PORT }}
          ssh_private_key: ${{ secrets.SILVASMS_SSH_KEY }}
          local_path: './Silvasms_Front/dist/'
          remote_path: ${{ secrets.SILVASMS_FRONTEND_DEPLOY_PATH }}
          sftp_only: true
